apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: dbaas-vm-provisioner
  title: Database-as-a-Service (DBaaS)
  description: Automatically provision a dedicated PostgreSQL or MySQL database VM on OpenShift Virtualization via AAP.
  tags:
    - database
    - openshift
    - ansible
spec:
  owner: guest
  type: service

  # 1. This builds the Frontend Form UI steps in the Portal
  parameters:
    - title: Database Specification Details
      description: Provide the parameters for your new database engine
      required:
        - db_type
        - vm_size
        - db_name
        - db_user
        - db_password
      properties:
        db_type:
          title: Database Engine Selection
          type: string
          description: Choose the underlying database core engine type.
          default: postgresql
          enum:
            - postgresql
            - mysql
          enumNames:
            - "PostgreSQL 15"
            - "MySQL / MariaDB"
        vm_size:
          title: Virtual Machine Compute Size
          type: string
          description: Select the CPU/RAM allocation for the underlying OpenShift Virtualization VM.
          default: small
          enum:
            - small
            - mid
            - large
          enumNames:
            - "Small (2 vCPU / 4Gi RAM)"
            - "Mid (4 vCPU / 8Gi RAM)"
            - "Large (8 vCPU / 16Gi RAM)"
        db_name:
          title: Database Name
          type: string
          description: Enter a unique identifier name for the database schema.
        db_user:
          title: Master Username
          type: string
          default: dbadmin
        db_password:
          title: Master Password
          type: string
          ui:widget: password

  # 2. This defines the Backend Actions: launch the AAP job, then register the result in the catalog
  steps:
    - id: launch-dbaas-job
      name: Creating your Database VM on OpenShift Virtualization...
      action: rhaap:launch-job-template
      input:
        token: ${{ secrets.aapToken }}
        values:
          template: "Database-as-a-Service (DBaaS) Provisioner"
          extraVariables:
            db_type: ${{ parameters.db_type }}
            vm_size: ${{ parameters.vm_size }}
            db_name: ${{ parameters.db_name }}
            db_user: ${{ parameters.db_user }}
            db_password: ${{ parameters.db_password }}

    - id: fetch-catalog-entity
      name: Render Catalog Entity
      action: fetch:template
      input:
        url: ../catalog-template
        targetPath: ./catalog
        values:
          db_name: ${{ parameters.db_name }}
          db_type: ${{ parameters.db_type }}
          db_type_short: ${{ "postgres" if parameters.db_type == "postgresql" else "mysql" }}
          # owner: ${{ user.entity.metadata.name }}
          owner: ${{ user.ref }}
          db_standard_url: ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_standard_url }}
          db_cli_command: ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_cli_command }}
        
    - id: publish-catalog-entity
      name: Publish Catalog Entity
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=loopandloop&repo=aap-self-service-database
        branchName: resources-${{ parameters.db_name }}
        title: "Register catalog entity for ${{ parameters.db_name }}"
        description: |
          Registers the Backstage Resource entity for the ${{ parameters.db_name }}
          ${{ parameters.db_type }} VM provisioned via AAP.
        sourcePath: ./catalog
        targetPath: resources/${{ parameters.db_name }}

    - id: register-catalog-entity
      name: Register Catalog Entity
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-catalog-entity'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'   # ← just the filename, no path repetition
      # 3. This surfaces results back to the requester once the job completes

  output:
    links:
      - title: Open AAP Job
        url: ${{ steps['launch-dbaas-job'].output.data.url }}
      - title: Catalog Entity Pull Request
        url: ${{ steps['publish-catalog-entity'].output.remoteUrl }}
      - title: Open Catalog Entity
        icon: catalog
        entityRef: ${{ steps['register-catalog-entity'].output.entityRef }}
    text:
      - title: Database Connection Summary
        content: |
          * **Database Engine:** ${{ parameters.db_type }}
          * **Database Name:** ${{ parameters.db_name }}
          * **Admin Username:** ${{ parameters.db_user }}

          **Standard Connection URL:**
          ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_standard_url }}

          **CLI Command:**
          ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_cli_command }}
