apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: dbaas-vm-provisioner
  title: Database-as-a-Service (DBaaS) Provisioner
  description: Automatically provision a dedicated PostgreSQL or MySQL database VM on OpenShift Virtualization via AAP.
  tags:
    - database
    - openshift
    - ansible
spec:
  owner: RedHat
  type: service

  parameters:
    - title: Database Specification Details
      required:
        - db_type
        - vm_size
        - db_name
        - db_user
        - db_password
      properties:
        db_type:
          title: Database Engine Selection
          type: string
          default: postgresql
          enum:
            - postgresql
            - mysql
          enumNames:
            - "PostgreSQL 15"
            - "MySQL / MariaDB"
        vm_size:
          title: Virtual Machine Compute Size
          type: string
          default: small
          enum:
            - small
            - medium
            - large
          enumNames:
            - "Small (2 vCPU, 4GB RAM)"
            - "Medium (4 vCPU, 8GB RAM)"
            - "Large (8 vCPU, 16GB RAM)"
        db_name:
          title: Database Name
          type: string
          default: app-db
        db_user:
          title: Master Username
          type: string
          default: dbadmin
        db_password:
          title: Master Password
          type: string
          ui:widget: password

  steps:
    - id: launch-dbaas-job
      name: Creating your Database VM on OpenShift Virtualization...
      action: rhaap:launch-job-template
      input:
        token: ${{ secrets.aapToken }}
        values:
          template: "Database-as-a-Service (DBaaS) Provisioner"
          extraVariables:
            db_type: ${{ parameters.db_type }}
            vm_size: ${{ parameters.vm_size }}
            db_name: ${{ parameters.db_name }}
            db_user: ${{ parameters.db_user }}
            db_password: ${{ parameters.db_password }}

    - id: fetch-catalog-entity
      name: Render Catalog Entity
      action: fetch:template
      input:
        url: ./catalog-template
        values:
          db_name: ${{ parameters.db_name }}
          db_type: ${{ parameters.db_type }}
          db_type_short: ${{ (parameters.db_type == 'postgresql') and 'postgres' or 'mysql' }}
          db_standard_url: ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_standard_url }}
          db_cli_command: ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_cli_command }}
          owner: ${{ user.ref }}

    - id: publish-catalog-entity
      name: Publish Catalog Entity
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=loopandloop&repo=aap-self-service-database
        branchName: register-${{ parameters.db_name }}
        title: "Register database: ${{ parameters.db_name }}"
        description: "Adds catalog entry for ${{ parameters.db_name }}"
        targetPath: resources/${{ parameters.db_name }}

    - id: register-catalog-entity
      name: Register Catalog Entity
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/loopandloop/aap-self-service-database/blob/register-${{ parameters.db_name }}/resources/${{ parameters.db_name }}/catalog-info.yaml

  output:
    text:
      - title: 'DBaaS Provisioning Requested Successfully.'
        content: |
          Your custom instance has been successfully provisioned on OpenShift Virtualization.

          ### Your Database Connection Summary

          * **Database Engine:** ${{ parameters.db_type }}
          * **Target Schema:** ${{ parameters.db_name }}
          * **Admin Username:** ${{ parameters.db_user }}

          #### Connection Details
          - **Standard URL:** ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_standard_url }}
          - **CLI Command:** ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data.db_cli_command }}

      # 🔍 TEMPORARY DEBUG — remove once db_standard_url / db_cli_command above are confirmed populated
      - title: DEBUG - events tail
        content: |
          Total events: ${{ steps['launch-dbaas-job'].output.data.events.length }}
          Last event type: ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event }}
          ${{ steps['launch-dbaas-job'].output.data.events[steps['launch-dbaas-job'].output.data.events.length - 1].event_data.artifact_data | dump }}

    links:
      - title: Open AAP Job
        url: ${{ steps['launch-dbaas-job'].output.data.url }}
      - title: View Registration Pull Request
        url: ${{ steps['publish-catalog-entity'].output.remoteUrl }}
